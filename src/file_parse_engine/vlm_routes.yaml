# ============================================================
# VLM Model Routing Configuration
# ============================================================
#
# This file controls which VLM model handles each extraction
# task.  To customise, copy this file to your project root
# (./vlm_routes.yaml) or point to a custom path via the
# environment variable FPE_VLM_ROUTES_FILE.
#
# API keys are read from environment variables listed under
# each provider's `api_key_env` field.
#
# Pricing is in USD per million tokens — used for cost
# estimation only.
# ============================================================

providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: FPE_OPENROUTER_API_KEY

  siliconflow:
    base_url: https://api.siliconflow.cn/v1
    api_key_env: FPE_SILICONFLOW_API_KEY

models:
  gemini-flash:
    provider: openrouter
    model_id: google/gemini-3.1-flash-lite-preview
    max_tokens: 8192
    temperature: 0.1
    pricing:
      input: 0.25    # $/M tokens
      output: 1.50   # $/M tokens

  gpt-5.4-nano:
    provider: openrouter
    model_id: openai/gpt-5.4-nano
    max_tokens: 8192
    temperature: 0.1
    pricing:
      input: 0.20     # $/M tokens
      output: 1.25    # $/M tokens

  qwen3-vl-8b:
    provider: openrouter
    model_id: qwen/qwen3-vl-8b-instruct
    max_tokens: 8192
    temperature: 0.1
    pricing:
      input: 0.08     # $/M tokens
      output: 0.50    # $/M tokens

  paddleocr:
    provider: siliconflow
    model_id: PaddlePaddle/PaddleOCR-VL-1.5
    max_tokens: 8192
    temperature: 0.1
    pricing:
      input: 0.00
      output: 0.00

# Task → model mapping
# Available task types: document, table, image, scan, slide
routes:
  document: gemini-flash
  table: gemini-flash
  image: gemini-flash
  scan: paddleocr
  slide: gemini-flash

defaults:
  primary: qwen3-vl-8b
  fallback: gemini-flash
  concurrency: 5
  timeout: 60
